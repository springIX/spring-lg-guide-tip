<style>
  body {
    margin: 0;
    padding: 0;
  }
  #kv .inwrap{
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }
  #kv .head{
    position: relative;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
    width: 100%;
    background: rgba(17, 17, 17, 0.6);
    backdrop-filter: blur(54px);
    -webkit-backdrop-filter: blur(54px);
    transition: backdrop-filter 0.5s ease, background-color 0.5s ease;
  }
  #kv .bg-img-wrap{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
  }
  #kv .bg-img-wrap img{
    position: absolute;
    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    object-fit: cover;
    transform: translate(-50%, -50%) scale(1);
    opacity: 0;
  }
  #kv .bg-img-wrap picture.active img{
    opacity: 1;
  }
  #kv .bg-img-wrap .kv1 img{
    height: 100vh;
    background: linear-gradient(180deg, rgba(0, 0, 0, 0.00) 0%, rgba(0, 0, 0, 0.20) 100%);
    backdrop-filter: blur(10px);
  }
  #kv .bg-img-wrap .kv2 img{
    width: 100%;
    height: auto;
    position: absolute;
    bottom: 0;
  }
  #kv .bg-img-wrap .kv3{
    width: 1800px;
    height: 496px;
    position: absolute;
    bottom: -110px;
    left: 50%;
    transform: translateX(-50%) scale(0.9);

  #kv .bg-img-wrap .kv4{

    max-width: 777px;

    top: 470px;
    left: 50%;

  #kv .bg-img-wrap picture{

    display: inline;
  }

    top: 50%;
    left: 50%;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    object-fit: cover;
